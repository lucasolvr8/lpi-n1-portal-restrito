<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Portal Restrito</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>

  <header>
    <div class="logo">
      <span class="logo-icon">⚡</span>
      <span class="logo-text">Acesso ao <strong>Portal</strong></span>
    </div>
  </header>

  <main>

    <div id="login-container">
      <div class="card">
        <div class="card-header">
          <h2>Entrar na plataforma</h2>
          <p class="subtitle">Insira suas credenciais para continuar</p>
        </div>

        <div class="form-group">
          <label for="username">Usuário</label>
          <input type="text" id="username" placeholder="Digite seu usuário" required />
        </div>

        <div class="form-group">
          <label for="password">Senha</label>
          <input type="password" id="password" placeholder="••••••••" required />
        </div>

        <button onclick="fazerLogin()">
          <span>Acessar plataforma</span>
          <span class="btn-arrow">→</span>
        </button>

        <p id="result"></p>
      </div>
    </div>

    <div id="dashboard">
      <div class="card dashboard-card">
        <div class="dashboard-icon">🚀</div>
        <h2>Acesso liberado!</h2>
        <p id="mensagem-sucesso"></p>
        <div class="dashboard-badge">Ambiente seguro</div>
      </div>
    </div>

  </main>

  <script src="script.js"></script>
</body>
</html>
